<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskManager — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07); --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e97b;
    --text: #f0f0f8; --muted: #7a7a9a;
    --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: float 8s ease-in-out infinite; }
  .orb1 { width: 500px; height: 500px; background: var(--accent3); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: var(--accent); bottom: -80px; left: -80px; animation-delay: -3s; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(15px,-15px)} }
  .grid-lines { position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; }
  .card { position: relative; z-index: 1; background: rgba(19,19,26,0.85); backdrop-filter: blur(24px); border: 1px solid var(--border); border-radius: 24px; padding: 48px 40px; width: 420px; animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent3), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .logo-text { font-family: var(--font-head); font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  h1 { font-family: var(--font-head); font-size: 28px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; transition: all 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--accent); background: rgba(108,99,255,0.08); box-shadow: 0 0 0 3px rgba(108,99,255,0.12); }
  .field input::placeholder { color: var(--muted); }
  .field select { cursor: pointer; }
  .field select option { background: var(--surface2); }

  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .role-card { background: var(--surface2); border: 2px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .role-card:hover { border-color: var(--accent); }
  .role-card.active { border-color: var(--accent); background: rgba(108,99,255,0.12); }
  .role-card .role-icon { font-size: 22px; margin-bottom: 6px; }
  .role-card .role-name { font-family: var(--font-head); font-size: 13px; font-weight: 700; }
  .role-card .role-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; border: none; border-radius: 12px; padding: 15px; font-family: var(--font-head); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.98); }
  .divider { text-align: center; margin: 20px 0; color: var(--muted); font-size: 13px; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: calc(50% - 20px); height: 1px; background: var(--border); }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .link-row { text-align: center; font-size: 14px; color: var(--muted); }
  .link-row a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .error-msg { background: rgba(255,101,132,0.12); border: 1px solid rgba(255,101,132,0.3); color: #ff6584; border-radius: 10px; padding: 12px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
  .error-msg.show { display: block; }
  .role-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; margin-bottom: 10px; display: block; }
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="grid-lines"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">Task<span>Pro</span></div>
  </div>
  <h1>Create account</h1>
  <p class="subtitle">Join your team workspace</p>
  <div class="error-msg" id="errMsg"></div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Choose a username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min. 6 characters">
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password">
  </div>
  <span class="role-label">Select Role</span>
  <div class="role-grid">
    <div class="role-card active" onclick="selectRole('member', this)">
      <div class="role-icon">👤</div>
      <div class="role-name">Member</div>
      <div class="role-desc">Manage own tasks</div>
    </div>
    <div class="role-card" onclick="selectRole('admin', this)">
      <div class="role-icon"></div>
      <div class="role-name">Admin</div>
      <div class="role-desc">Full access</div>
    </div>
  </div>
  <input type="hidden" id="role" value="member">
  <div class="field" id="adminCodeField" style="display:none">
    <label>Admin Secret Code</label>
    <input type="password" id="adminCode" placeholder="Enter admin secret code">
    <div style="font-size:11px;color:var(--muted);margin-top:4px">Contact your system admin for this code.</div>
  </div>
  <button class="btn-primary" onclick="doSignup()">Create Account →</button>
  <div class="divider">or</div>
  <div class="link-row">Already have an account? <a href="login.html">Sign in</a></div>
</div>
<script>
const API = "http://127.0.0.1:8000";
function selectRole(role, el) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('role').value = role;
  const adminField = document.getElementById('adminCodeField');
  if (role === 'admin') {
    adminField.style.display = 'block';
  } else {
    adminField.style.display = 'none';
    document.getElementById('adminCode').value = '';
  }
}
function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.classList.add('show');
}
async function doSignup() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const role = document.getElementById('role').value;
  if (!username || !password) { showError('Please fill all fields'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
  if (password !== confirm) { showError('Passwords do not match'); return; }
  try {
    const adminCode = role === 'admin' ? document.getElementById('adminCode').value : null;
    const res = await fetch(API + '/signup', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password, role, admin_code: adminCode}) });
    const data = await res.json();
    if (data.detail || data.error) { showError(data.detail || data.error); return; }
    alert('Account created! Please sign in.');
    window.location.href = 'login.html';
  } catch { showError('Cannot connect to backend.'); }
}
</script>
</body>
</html>
